server:
  port: 8080
spring:
  application:
    name: "CrediNow"
  devtools:
    add-properties: false
  profiles:
    include: null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "https://idp.example.com/issuer"
          client-id: "myclientid"
jwt:
  json-exp-roles: "/roles"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

adapters:
  r2dbc:
    host: "localhost"
    port: 5432
    database: "postgres"
    username: "postgres"
    password: "postgres"

logging:
  level:
    org.springframework.r2dbc: DEBUG